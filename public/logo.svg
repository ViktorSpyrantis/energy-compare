<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Telescope tube -->
  <rect x="4" y="9" width="22" height="7" rx="2" transform="rotate(-20 15 12.5)" fill="white"/>
  <!-- Lens (front, larger) -->
  <rect x="1" y="11" width="4" height="9" rx="2" transform="rotate(-20 3 15.5)" fill="white" opacity="0.9"/>
  <!-- Eyepiece (back, smaller) -->
  <rect x="25" y="6" width="4" height="5" rx="1.5" transform="rotate(-20 27 8.5)" fill="white" opacity="0.8"/>
  <!-- Tripod mount point -->
  <circle cx="18" cy="18" r="2" fill="white"/>
  <!-- Tripod legs -->
  <line x1="18" y1="20" x2="12" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="24" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="18" y2="31" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="4" cy="3" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="28" cy="2" r="0.8" fill="white" opacity="0.5"/>
</svg>
