<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
  <!-- Telescope tube -->
  <line x1="2" y1="21" x2="18" y2="9" stroke-width="3.5"/>
  <!-- Lens (wider front) -->
  <line x1="0.5" y1="23.5" x2="4" y2="20" stroke-width="5.5"/>
  <!-- Eyepiece (narrow back) -->
  <line x1="18" y1="9" x2="21" y2="7" stroke-width="2"/>
  <!-- Tripod legs from midpoint -->
  <line x1="10" y1="15" x2="5" y2="29" stroke-width="1.8"/>
  <line x1="10" y1="15" x2="16" y2="29" stroke-width="1.8"/>
  <!-- Power symbol (top-right corner, the "star" being observed) -->
  <path d="M23.5 8 A4 4 0 1 0 28.5 8" stroke-width="1.8" fill="none"/>
  <line x1="26" y1="2.5" x2="26" y2="7.5" stroke-width="1.8"/>
</svg>
